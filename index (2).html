<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل ملف PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
        }
        .download-btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .download-btn:active {
            transform: scale(0.95);
            background-color: #219150;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📄</div>
        <h1>جاهز للتحميل</h1>
        <p>يمكنك الآن تحميل ملف الـ PDF الخاص بك بضغطة زر واحدة وبشكل مباشر.</p>
        
        <a href="https://gofile.io/d/5m02zR" class="download-btn">اضغط هنا للتحميل</a>
        
        <div class="footer">
            تم الرفع بواسطة Ziko
        </div>
    </div>

</body>
</html>
